name: Metrics
on:
  # Schedule updates (every midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_lines: yes
          plugin_stars: yes
          plugin_stars_limit: 3
          theme: dark
          extras_css: |
            /* Tokyo Night */
            .items-wrapper, svg { background: #1a1b27 !important; }
            svg            { color: #a9b1d6 !important; }
            h1, h2         { color: #7aa2f7 !important; }
            h1 svg, h2 svg { fill:  #bb9af7 !important; }
            .field svg     { fill:  #7aa2f7 !important; }
            .added         { color: #9ece6a !important; }
            footer span    { color: #565f89 !important; }
            :root {
              --color-calendar-graph-day-bg:    #1f2335 !important;
              --color-calendar-graph-day-L1-bg: #3d59a1 !important;
              --color-calendar-graph-day-L2-bg: #7aa2f7 !important;
              --color-calendar-graph-day-L3-bg: #9ece6a !important;
              --color-calendar-graph-day-L4-bg: #bb9af7 !important;
            }

      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          theme: dark
          extras_css: |
            /* Tokyo Night */
            .items-wrapper, svg { background: #1a1b27 !important; }
            svg            { color: #a9b1d6 !important; }
            h1, h2         { color: #7aa2f7 !important; }
            h1 svg, h2 svg { fill:  #bb9af7 !important; }
            .field svg     { fill:  #7aa2f7 !important; }
            .added         { color: #9ece6a !important; }
            footer span    { color: #565f89 !important; }
            :root {
              --color-calendar-graph-day-bg:    #1f2335 !important;
              --color-calendar-graph-day-L1-bg: #3d59a1 !important;
              --color-calendar-graph-day-L2-bg: #7aa2f7 !important;
              --color-calendar-graph-day-L3-bg: #9ece6a !important;
              --color-calendar-graph-day-L4-bg: #bb9af7 !important;
            }

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 4
          theme: dark
          extras_css: |
            /* Tokyo Night */
            .items-wrapper, svg { background: #1a1b27 !important; }
            svg            { color: #a9b1d6 !important; }
            h1, h2         { color: #7aa2f7 !important; }
            h1 svg, h2 svg { fill:  #bb9af7 !important; }
            .field svg     { fill:  #7aa2f7 !important; }
            .added         { color: #9ece6a !important; }
            footer span    { color: #565f89 !important; }
            :root {
              --color-calendar-graph-day-bg:    #1f2335 !important;
              --color-calendar-graph-day-L1-bg: #3d59a1 !important;
              --color-calendar-graph-day-L2-bg: #7aa2f7 !important;
              --color-calendar-graph-day-L3-bg: #9ece6a !important;
              --color-calendar-graph-day-L4-bg: #bb9af7 !important;
            }
