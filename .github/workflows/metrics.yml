name: Metrics
on:
  # Schedule updates (every midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_lines: yes
          plugin_stars: yes
          plugin_stars_limit: 3
          theme: dark
          extras_css: |
            /* Terminal (green-on-black) */
            .items-wrapper, svg { background: #0a0e14 !important; }
            svg, svg *     { font-family: "JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace !important; }
            svg            { color: #c0ffce !important; }
            h1, h2         { color: #39d353 !important; }
            h1 svg, h2 svg { fill:  #39d353 !important; }
            .field svg     { fill:  #39d353 !important; }
            .added         { color: #39d353 !important; }
            footer span    { color: #2ea043 !important; }
            h2::before     { content: "> " !important; color: #39d353 !important; }
            :root {
              --color-calendar-graph-day-bg:    #0d1117 !important;
              --color-calendar-graph-day-L1-bg: #0e4429 !important;
              --color-calendar-graph-day-L2-bg: #006d32 !important;
              --color-calendar-graph-day-L3-bg: #26a641 !important;
              --color-calendar-graph-day-L4-bg: #39d353 !important;
            }

      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          theme: dark
          extras_css: |
            /* Terminal (green-on-black) */
            .items-wrapper, svg { background: #0a0e14 !important; }
            svg, svg *     { font-family: "JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace !important; }
            svg            { color: #c0ffce !important; }
            h1, h2         { color: #39d353 !important; }
            h1 svg, h2 svg { fill:  #39d353 !important; }
            .field svg     { fill:  #39d353 !important; }
            .added         { color: #39d353 !important; }
            footer span    { color: #2ea043 !important; }
            h2::before     { content: "> " !important; color: #39d353 !important; }
            :root {
              --color-calendar-graph-day-bg:    #0d1117 !important;
              --color-calendar-graph-day-L1-bg: #0e4429 !important;
              --color-calendar-graph-day-L2-bg: #006d32 !important;
              --color-calendar-graph-day-L3-bg: #26a641 !important;
              --color-calendar-graph-day-L4-bg: #39d353 !important;
            }

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 4
          theme: dark
          extras_css: |
            /* Terminal (green-on-black) */
            .items-wrapper, svg { background: #0a0e14 !important; }
            svg, svg *     { font-family: "JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace !important; }
            svg            { color: #c0ffce !important; }
            h1, h2         { color: #39d353 !important; }
            h1 svg, h2 svg { fill:  #39d353 !important; }
            .field svg     { fill:  #39d353 !important; }
            .added         { color: #39d353 !important; }
            footer span    { color: #2ea043 !important; }
            h2::before     { content: "> " !important; color: #39d353 !important; }
            :root {
              --color-calendar-graph-day-bg:    #0d1117 !important;
              --color-calendar-graph-day-L1-bg: #0e4429 !important;
              --color-calendar-graph-day-L2-bg: #006d32 !important;
              --color-calendar-graph-day-L3-bg: #26a641 !important;
              --color-calendar-graph-day-L4-bg: #39d353 !important;
            }

      - name: Skills
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-extras.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_sort: stars
          plugin_topics_limit: 0
          theme: dark
          extras_css: |
            /* Terminal (green-on-black) */
            .items-wrapper, svg { background: #0a0e14 !important; }
            svg, svg *     { font-family: "JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace !important; }
            svg            { color: #c0ffce !important; }
            h1, h2         { color: #39d353 !important; }
            h1 svg, h2 svg { fill:  #39d353 !important; }
            .field svg     { fill:  #39d353 !important; }
            .added         { color: #39d353 !important; }
            footer span    { color: #2ea043 !important; }
            h2::before     { content: "> " !important; color: #39d353 !important; }
            :root {
              --color-calendar-graph-day-bg:    #0d1117 !important;
              --color-calendar-graph-day-L1-bg: #0e4429 !important;
              --color-calendar-graph-day-L2-bg: #006d32 !important;
              --color-calendar-graph-day-L3-bg: #26a641 !important;
              --color-calendar-graph-day-L4-bg: #39d353 !important;
            }
